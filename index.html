<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HoloTarot</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
:root{--bg:#04030a;--gold:#c5a059;--gold2:#f0d080;--cw:76px;--ch:128px;--glass:rgba(6,4,16,0.97)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'Cormorant Garamond',serif;user-select:none}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ══ 儀式畫面 ══ */
#ritual{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:28px;
    background:radial-gradient(ellipse at 50% 55%,#150e28 0%,#04030a 68%)}
.r-title{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:9px;color:var(--gold);
    text-transform:uppercase;opacity:0;animation:fup 1s 0.2s forwards}
#intent-wrap{width:86%;max-width:310px;opacity:0;animation:fup 1s 0.5s forwards}
#intent-input{width:100%;background:none;border:none;border-bottom:1px solid rgba(197,160,89,0.22);
    color:var(--gold2);text-align:center;padding:12px 6px;font-size:0.95rem;
    font-family:'Cormorant Garamond',serif;letter-spacing:2px;outline:none;user-select:text;touch-action:auto}
#intent-input::placeholder{color:rgba(197,160,89,0.2);font-size:0.7rem;letter-spacing:3px}
#intent-input:focus{border-bottom-color:var(--gold)}
#chips{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-top:16px}
.chip{padding:5px 13px;border-radius:18px;border:1px solid rgba(197,160,89,0.22);
    font-size:0.62rem;color:var(--gold2);background:rgba(197,160,89,0.04);
    cursor:pointer;letter-spacing:1px;touch-action:manipulation;transition:all 0.25s}
.chip:active{background:rgba(197,160,89,0.18);transform:scale(0.92)}
.orb-outer{position:relative;width:82px;height:82px;display:flex;align-items:center;
    justify-content:center;cursor:pointer;touch-action:none;opacity:0;animation:fup 1s 0.8s forwards}
.orb-ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(197,160,89,0.28);pointer-events:none}
.orb-glow{position:absolute;inset:0;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,rgba(197,160,89,0.06) 0%,transparent 70%)}
.orb-ball{width:50px;height:50px;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle at 33% 30%,#fff9e8,var(--gold) 50%,#2a1400 100%);
    box-shadow:0 0 18px rgba(197,160,89,0.6),0 0 50px rgba(197,160,89,0.12)}
.orb-svg{position:absolute;inset:-4px;pointer-events:none}
.orb-track{fill:none;stroke:rgba(197,160,89,0.12);stroke-width:1.5}
.orb-arc{fill:none;stroke:var(--gold2);stroke-width:1.5;stroke-linecap:round;stroke-dasharray:0 220}
.orb-hint{font-size:0.48rem;color:rgba(197,160,89,0.28);letter-spacing:4px;text-transform:uppercase}
@keyframes fup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ══ 主場景 ══ */
#scene{position:fixed;inset:0;z-index:10;display:none;overflow:hidden}
#hdr{position:absolute;top:24px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;
    font-size:0.58rem;letter-spacing:9px;color:rgba(197,160,89,0.35);
    text-transform:uppercase;z-index:20;pointer-events:none}

/* 輸送帶（上方 32%）*/
#stream-wrap{position:absolute;top:32%;left:0;width:100%;height:var(--ch);
    z-index:20;transform:translateY(-50%);overflow:visible}
#stream{position:relative;width:100%;height:100%}

/* 槽位（下方 72%，跟原版一致）*/
#slots{position:absolute;top:72%;left:0;right:0;
    display:flex;justify-content:center;align-items:center;gap:18px;
    z-index:30;pointer-events:none;transform:translateY(-50%)}
.slot{width:var(--cw);height:var(--ch);border-radius:9px;
    border:1px dashed rgba(197,160,89,0.1);display:flex;flex-direction:column;
    align-items:center;justify-content:flex-end;padding-bottom:7px;
    transition:border-color 0.4s,background 0.4s,box-shadow 0.4s}
.slot.ready{border-color:rgba(197,160,89,0.5);background:rgba(197,160,89,0.05);
    box-shadow:0 0 20px rgba(197,160,89,0.1) inset}
.slot-lbl{font-size:0.38rem;letter-spacing:3px;color:rgba(197,160,89,0.2);text-transform:uppercase}

/* 牌片 */
.card{position:absolute;width:var(--cw);height:var(--ch);
    transform-style:preserve-3d;cursor:pointer;touch-action:manipulation}
.card.captured{position:fixed!important;z-index:400!important;cursor:pointer;touch-action:manipulation}
.c-back,.c-front{position:absolute;inset:0;border-radius:8px;backface-visibility:hidden}
.c-back{background:#07050f;border:1px solid rgba(197,160,89,0.55);
    display:flex;align-items:center;justify-content:center}
.c-back svg{width:60%;height:60%;opacity:0.35}
.c-front{background:#000;transform:rotateY(180deg);overflow:hidden;border:1.5px solid var(--gold)}
.c-front img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.5s}
.c-front img.ok{opacity:1}

/* 粒子 / 重啟 */
.pt{position:fixed;width:3px;height:3px;border-radius:50%;pointer-events:none;z-index:997;background:var(--gold2)}
#restart{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    background:none;border:1px solid rgba(197,160,89,0.2);color:var(--gold);
    padding:7px 22px;border-radius:18px;font-size:0.6rem;letter-spacing:3px;
    font-family:'Cinzel',serif;opacity:0;pointer-events:none;z-index:600;touch-action:manipulation}

/* ══ 詳情面板 ══ */
#panel{position:fixed;width:91%;max-width:340px;max-height:72vh;
    background:var(--glass);backdrop-filter:blur(50px);
    border:1px solid rgba(197,160,89,0.3);border-radius:26px;
    padding:28px 12px 22px 22px;z-index:600;opacity:0;pointer-events:none;
    left:50%;transform:translateX(-50%) translateY(24px);top:8%;
    display:flex;flex-direction:column;box-shadow:0 40px 100px rgba(0,0,0,0.9);
    transition:opacity 0.45s,transform 0.55s cubic-bezier(0.19,1,0.22,1);touch-action:auto}
#panel.on{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
#pscroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
    touch-action:pan-y;padding-right:14px;margin-bottom:14px}
#pscroll::-webkit-scrollbar{width:2px}
#pscroll::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}
.p-lbl{font-size:0.48rem;color:var(--gold);letter-spacing:6px;margin-bottom:10px;
    opacity:0.55;text-transform:uppercase;text-align:center;font-family:'Cinzel',serif}
.p-name{font-size:1.5rem;font-weight:300;color:#fff;margin-bottom:6px;letter-spacing:2px;text-align:center}
.p-ori{font-size:0.6rem;margin-bottom:22px;font-weight:600;text-align:center;
    font-family:'Cinzel',serif;letter-spacing:2px}
#p-body{font-size:0.92rem;line-height:2.1;color:#ccc;text-align:justify;
    padding-bottom:18px;user-select:text;white-space:pre-wrap}
.p-btn{background:rgba(197,160,89,0.14);border:1px solid var(--gold);color:var(--gold2);
    padding:13px 0;border-radius:24px;font-size:0.7rem;letter-spacing:3px;cursor:pointer;
    width:calc(100% - 14px);flex-shrink:0;font-family:'Cinzel',serif;touch-action:manipulation}
.glow-btn{animation:gBtn 2.5s infinite;background:rgba(197,160,89,0.22)}
@keyframes gBtn{0%,100%{box-shadow:0 0 4px var(--gold)}50%{box-shadow:0 0 18px var(--gold2)}}

/* ══ 手勢 UI ══ */
#gesture-btn{position:fixed;top:16px;right:16px;z-index:700;width:44px;height:44px;
    border-radius:50%;border:1px solid rgba(197,160,89,0.3);background:rgba(6,4,16,0.85);
    display:none;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation}
#gesture-btn.active{border-color:var(--gold);box-shadow:0 0 14px rgba(197,160,89,0.4)}
#gesture-btn svg{width:22px;height:22px;opacity:0.55}
#gesture-btn.active svg{opacity:1}
#g-status{position:fixed;top:16px;right:68px;z-index:700;font-family:'Cinzel',serif;
    font-size:0.4rem;letter-spacing:2px;color:rgba(197,160,89,0.6);display:none;
    align-items:center;background:rgba(6,4,16,0.85);padding:6px 12px;border-radius:12px;
    border:1px solid rgba(197,160,89,0.15);white-space:nowrap;max-width:200px}
#g-status.show{display:flex}

/* 手勢狀態指示燈 */
#g-indicator{position:fixed;top:68px;right:16px;z-index:700;width:44px;
    display:none;flex-direction:column;align-items:center;gap:4px}
#g-indicator.show{display:flex}
.g-dot{width:8px;height:8px;border-radius:50%;background:rgba(197,160,89,0.2);transition:all 0.15s}
.g-dot.open{background:#f0d080;box-shadow:0 0 8px #f0d080}
.g-dot.fist{background:#ff6b6b;box-shadow:0 0 8px #ff6b6b}
.g-label{font-size:0.35rem;color:rgba(197,160,89,0.4);letter-spacing:1px;text-align:center}

/* 閃光 */
#g-flash{position:fixed;inset:0;z-index:690;pointer-events:none;
    background:radial-gradient(ellipse at 50% 50%,rgba(197,160,89,0.18) 0%,transparent 65%);
    opacity:0;transition:opacity 0.1s}
#g-flash.on{opacity:1}
#mp-video{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<!-- 儀式畫面 -->
<div id="ritual">
    <div class="r-title">Celestial Oracle</div>
    <div id="intent-wrap">
        <input type="text" id="intent-input" placeholder="輸入您的問題或困惑..." maxlength="50">
        <div id="chips">
            <div class="chip" onclick="setQ('請解析我近期的感情運勢與發展。')">感情</div>
            <div class="chip" onclick="setQ('關於目前的事業方向，請給予指引。')">事業</div>
            <div class="chip" onclick="setQ('未來的財富狀況與具體獲利機會？')">財富</div>
            <div class="chip" onclick="setQ('如何具體優化目前的生活狀態？')">提升</div>
        </div>
    </div>
    <div class="orb-outer" id="orb">
        <svg class="orb-svg" viewBox="0 0 90 90">
            <circle class="orb-track" cx="45" cy="45" r="42"/>
            <circle class="orb-arc" id="orb-arc" cx="45" cy="45" r="42" transform="rotate(-90 45 45)"/>
        </svg>
        <div class="orb-ring"></div><div class="orb-glow"></div><div class="orb-ball"></div>
    </div>
    <div class="orb-hint">長按啟動占卜</div>
</div>

<!-- 主場景 -->
<div id="scene">
    <div id="hdr">Celestial Oracle · Draw Three</div>
    <div id="stream-wrap"><div id="stream"></div></div>
    <div id="slots">
        <div class="slot" id="slot-0"><div class="slot-lbl">Past</div></div>
        <div class="slot" id="slot-1"><div class="slot-lbl">Present</div></div>
        <div class="slot" id="slot-2"><div class="slot-lbl">Future</div></div>
    </div>
</div>

<!-- 面板 -->
<div id="panel">
    <div id="pscroll">
        <div class="p-lbl" id="p-lbl">POSITION</div>
        <div class="p-name" id="p-name">—</div>
        <div class="p-ori" id="p-ori">UPRIGHT</div>
        <div id="p-body">讀取中...</div>
    </div>
    <button class="p-btn" id="p-btn">下一步</button>
</div>
<button id="restart" onclick="location.reload()">重新占卜</button>

<!-- 手勢 -->
<video id="mp-video" playsinline></video>
<button id="gesture-btn" title="手勢控制">
    <svg viewBox="0 0 24 24" fill="none" stroke="#c5a059" stroke-width="1.5">
        <path d="M18 11V6a2 2 0 0 0-4 0v1M14 10V4a2 2 0 0 0-4 0v2M10 10.5V6a2 2 0 0 0-4 0v8"/>
        <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34L3 16"/>
    </svg>
</button>
<div id="g-status">偵測中...</div>
<div id="g-indicator">
    <div class="g-dot" id="g-dot"></div>
    <div class="g-label" id="g-label">—</div>
</div>
<div id="g-flash"></div>

<script>
// ══ 星空 ══
(()=>{
    const c=document.getElementById('stars'),ctx=c.getContext('2d');
    c.width=window.innerWidth;c.height=window.innerHeight;
    const stars=Array.from({length:180},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.2,a:Math.random(),sp:0.002+Math.random()*0.003}));
    function draw(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.a+=s.sp;if(s.a>1||s.a<0)s.sp*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,248,220,${s.a*0.7})`;ctx.fill();});requestAnimationFrame(draw);}
    draw();
})();

// ══ 資料 ══
const imgBase="https://www.trustedtarot.com/img/cards/";
const mSlugs=["the-fool","the-magician","the-high-priestess","the-empress","the-emperor","the-hierophant","the-lovers","the-chariot","strength","the-hermit","wheel-of-fortune","justice","the-hanged-man","death","temperance","the-devil","the-tower","the-star","the-moon","the-sun","judgement","the-world"];
const mNames=["愚者","魔術師","女教皇","女皇","皇帝","教皇","戀人","戰車","力量","隱士","命運之輪","正義","倒吊人","死神","節制","惡魔","高塔","星星","月亮","太陽","審判","世界"];
let cardData=[];
mNames.forEach((n,i)=>cardData.push({name:n,img:`${imgBase}${mSlugs[i]}.png`}));
["wands","cups","swords","pentacles"].forEach((s,si)=>{
    ["ace","two","three","four","five","six","seven","eight","nine","ten","page","knight","queen","king"]
    .forEach((r,ri)=>cardData.push({name:["權杖","聖杯","寶劍","錢幣"][si]+["一","二","三","四","五","六","七","八","九","十","侍從","騎士","皇后","國王"][ri],img:`${imgBase}${r}-of-${s}.png`}));
});

// ══ 狀態 ══
const API_URL="/api/gemini";
let userIntent="",pickedCount=0,pickedSeq=[],nextReveal=0;
let deckObjs=[];
const CW=76,CH=128;

// 輸送帶控制
let streamLoops=[];      // 每張牌的 gsap loop
let streamSpeed=1;       // 速度倍率（手勢控制）
let streamRunning=false; // 是否在跑

function haptic(p){window.navigator?.vibrate?.(p)}

// ══ 輸入 / Orb ══
const intentInput=document.getElementById('intent-input');
const orb=document.getElementById('orb');
const orbArc=document.getElementById('orb-arc');
const CIRCUM=2*Math.PI*42;
orbArc.style.strokeDasharray=`0 ${CIRCUM}`;
orb.style.opacity='0.4';orb.style.pointerEvents='none';
intentInput.addEventListener('input',()=>{
    const ok=intentInput.value.trim().length>0;
    orb.style.opacity=ok?'1':'0.4';orb.style.pointerEvents=ok?'auto':'none';
});
function setQ(t){intentInput.value=t;intentInput.blur();orb.style.opacity='1';orb.style.pointerEvents='auto';haptic(15)}

let holdTimer=null;
orb.addEventListener('touchstart',e=>{
    e.preventDefault();e.stopPropagation();
    intentInput.blur();userIntent=intentInput.value.trim();
    gsap.to(orb,{scale:1.25,duration:1.2,ease:"power2.in"});
    gsap.to('.orb-ball',{boxShadow:'0 0 35px rgba(197,160,89,0.9)',duration:1.2});
    let t=0;
    holdTimer=setInterval(()=>{
        t+=50;const p=Math.min(t/1200,1);
        orbArc.style.strokeDasharray=`${p*CIRCUM} ${CIRCUM}`;
        if(p>=1){clearInterval(holdTimer);holdTimer=null;haptic(80);startScene();}
    },50);
},{passive:false});
orb.addEventListener('touchend',e=>{
    e.stopPropagation();
    if(holdTimer){clearInterval(holdTimer);holdTimer=null;
        orbArc.style.strokeDasharray=`0 ${CIRCUM}`;
        gsap.to(orb,{scale:1,duration:0.35});
        gsap.to('.orb-ball',{boxShadow:'0 0 18px rgba(197,160,89,0.6)',duration:0.35});}
},{passive:true});

// ══ 啟動 ══
function startScene(){
    gsap.to('#ritual',{opacity:0,duration:0.7,onComplete:()=>{
        document.getElementById('ritual').style.display='none';
        document.getElementById('scene').style.display='block';
        buildStream();
        setTimeout(()=>{
            document.getElementById('gesture-btn').style.display='flex';
        },800);
    }});
}

// ══ 建立輸送帶 ══
function buildStream(){
    const stream=document.getElementById('stream');
    stream.innerHTML='';
    deckObjs=[];streamLoops=[];

    const spacing=110,totalW=78*spacing,screenMid=window.innerWidth/2;
    const shuffled=[...cardData].sort(()=>Math.random()-0.5);
    const BASE_DUR=5; // 秒，越小越快

    for(let i=0;i<78;i++){
        const el=document.createElement('div');
        el.className='card';
        const isRev=Math.random()>0.72;
        el.innerHTML=`<div class="c-back"><svg viewBox="0 0 100 100" fill="none" stroke="#c5a059" stroke-width="0.8"><circle cx="50" cy="50" r="44"/><path d="M50 6L50 94M6 50L94 50"/><polygon points="50,26 66,50 50,74 34,50"/></svg></div><div class="c-front"><img src="${shuffled[i].img}" onload="this.classList.add('ok')"></div>`;
        const startX=i*spacing;
        gsap.set(el,{x:startX,y:0,visibility:'visible',opacity:0});
        stream.appendChild(el);
        if(isRev)el.querySelector('.c-front img').style.transform='rotate(180deg)';
        gsap.to(el,{opacity:1,duration:0.6,delay:i*0.005});

        const obj={el,data:shuffled[i],isRev,isPicked:false,startX};
        deckObjs.push(obj);

        const loop=gsap.to(el,{
            x:`-=${totalW}`,duration:BASE_DUR,ease:"none",repeat:-1,
            modifiers:{
                x:gsap.utils.unitize(x=>{
                    const cx=((parseFloat(x)+400)%totalW+totalW)%totalW-400;
                    const dist=Math.abs(cx-screenMid+38);
                    el.style.filter=dist<70?`brightness(1.8) drop-shadow(0 0 12px var(--gold))`:`brightness(1)`;
                    return cx;
                }),
                y:()=>Math.sin(Date.now()*0.008+startX)*10
            }
        });
        streamLoops.push(loop);
        streamRunning=true;

        // 直接點牌抽牌（非手勢模式）
        el.addEventListener('click',()=>{
            if(gestureEnabled)return; // 手勢模式不用點
            if(pickedCount<3&&!obj.isPicked)captureCard(obj);
        });
    }
}

// ══ 輸送帶速度控制 ══
function setStreamSpeed(speed){
    // speed: 1=正常, 3=快速（張手）, 0=停止
    streamLoops.forEach(loop=>{
        if(speed===0){
            loop.timeScale(1);
            loop.pause();
        } else {
            if(loop.paused())loop.resume();
            loop.timeScale(speed);
        }
    });
    streamRunning=speed>0;
}

// ══ 抓牌 ══
function captureCard(obj){
    if(obj.isPicked||pickedCount>=3)return;
    obj.isPicked=true;haptic(40);

    const myIdx=pickedCount;
    pickedCount++;

    const slot=document.getElementById(`slot-${myIdx}`);
    const sr=slot.getBoundingClientRect();
    const or=obj.el.getBoundingClientRect();

    // 暫停這張牌的loop
    if(streamLoops[deckObjs.indexOf(obj)]){
        streamLoops[deckObjs.indexOf(obj)].pause();
    }

    const clone=obj.el.cloneNode(true);
    clone.className='card captured';
    clone.style.cssText=`left:${or.left}px;top:${or.top}px;width:${CW}px;height:${CH}px;transform:none;z-index:450`;
    document.body.appendChild(clone);
    if(obj.isRev)clone.querySelector('.c-front img').style.transform='rotate(180deg)';

    gsap.to(obj.el,{opacity:0.15,duration:0.4});
    obj.el.style.pointerEvents='none';

    for(let i=0;i<12;i++)spawnPt(or.left+CW/2,or.top+CH/2);

    const info={el:clone,data:obj.data,isRev:obj.isRev,isRevealed:false,pIndex:myIdx};
    pickedSeq.push(info);

    gsap.timeline()
        .to(clone,{scale:1.3,y:-30,duration:0.3,ease:"power2.out"})
        .to(clone,{
            left:sr.left,top:sr.top,scale:1,y:0,
            duration:0.9,ease:"expo.inOut",
            onUpdate:()=>spawnPt(parseFloat(clone.style.left)+CW/2,parseFloat(clone.style.top)+CH/2,0.3),
            onComplete:()=>{
                slot.classList.add('ready');
                clone.addEventListener('click',()=>revealCard(info));
                if(pickedCount===3){
                    gsap.to('#restart',{opacity:1,pointerEvents:'auto',delay:0.8});
                    deckObjs.forEach(o=>{if(!o.isPicked)gsap.to(o.el,{opacity:0.07,duration:1.2});});
                    setStreamSpeed(0);
                }
            }
        });
}

function spawnPt(x,y,chance=1){
    if(Math.random()>chance)return;
    const p=document.createElement('div');p.className='pt';document.body.appendChild(p);
    gsap.set(p,{left:x,top:y,opacity:0.8});
    gsap.to(p,{x:(Math.random()-.5)*60,y:(Math.random()-.5)*60,opacity:0,scale:0,duration:0.7,onComplete:()=>p.remove()});
}

// ══ 翻牌 ══
function revealCard(obj){
    if(!obj.isRevealed){
        obj.isRevealed=true;nextReveal=Math.max(nextReveal,obj.pIndex+1);haptic([15,50]);
        gsap.to(obj.el.querySelector('.c-back'),{rotationY:90,duration:0.3,onComplete:()=>{
            obj.el.querySelector('.c-back').style.display='none';
            obj.el.querySelector('.c-front').style.transform='none';
            gsap.from(obj.el.querySelector('.c-front'),{rotationY:-90,duration:0.4,ease:"back.out(1.2)",
                onComplete:()=>showPanel(obj)});
        }});
    } else {
        document.getElementById('panel').classList.remove('on');
        setTimeout(()=>showPanel(obj),100);
    }
}

// ══ 面板 ══
const pscroll=document.getElementById('pscroll');
pscroll.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
pscroll.addEventListener('touchmove',e=>e.stopPropagation(),{passive:true});

function showPanel(obj){
    document.getElementById('p-lbl').innerText=["過去：基礎與因果","現在：目前狀態","未來：走向顯化"][obj.pIndex];
    document.getElementById('p-name').innerText=obj.data.name;
    const ori=document.getElementById('p-ori');
    ori.innerText=obj.isRev?"逆位 REVERSED":"正位 UPRIGHT";
    ori.style.color=obj.isRev?"#ff6b6b":"#f0d080";
    document.getElementById('p-body').innerText=`這張牌展現了深刻的能量共振。${obj.isRev?'逆位暗示著能量正處於內省、阻滯或需要重新審視的階段。':'正位代表能量正順暢流動，展現出穩定、積極且向外顯化的趨勢。'}`;
    pscroll.scrollTop=0;
    const btn=document.getElementById('p-btn');
    btn.classList.remove('glow-btn');btn.onclick=null;
    if(nextReveal<3){
        const nxt=pickedSeq[nextReveal];
        if(nxt){btn.innerText="讀取下一步";btn.onclick=()=>{document.getElementById('panel').classList.remove('on');setTimeout(()=>revealCard(nxt),300)};}
        else{btn.innerText="繼續選取剩餘的牌";btn.onclick=()=>document.getElementById('panel').classList.remove('on');}
    } else {
        btn.innerText="獲得大師深度解讀";btn.classList.add('glow-btn');btn.onclick=()=>callAI();
    }
    setTimeout(()=>document.getElementById('panel').classList.add('on'),40);
}

document.addEventListener('click',e=>{
    const panel=document.getElementById('panel');
    if(!panel.classList.contains('on'))return;
    if(e.target.closest('#panel')||e.target.closest('.card'))return;
    panel.classList.remove('on');
});

// ══ AI ══
async function callAI(){
    const body=document.getElementById('p-body'),btn=document.getElementById('p-btn');
    btn.disabled=true;pscroll.scrollTop=0;
    body.innerText=`正在為您審視「${userIntent}」的全局脈絡...\n\n請稍候片刻。`;
    const cs=pickedSeq.map(o=>`${["過去","現在","未來"][o.pIndex]}:${o.data.name}(${o.isRev?'逆位':'正位'})`).join('、');
    const payload={
        contents:[{parts:[{text:`尋求者的問題：『${userIntent}』\n牌陣：${cs}\n\n請以資深塔羅顧問身份，莊重、專業地回覆，字數約500字。\n架構：\n1.過去[牌名]—解析根源\n2.現在[牌名]—現實瓶頸\n3.未來[牌名]—走向指引\n4.整合建議`}]}],
        systemInstruction:{parts:[{text:"您是具備深厚底蘊的塔羅大師，語言洗鍊、精準、客觀，以「您」稱呼求問者。"}]}
    };
    try{
        const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
        const data=await res.json();
        if(data.error){body.innerText="API錯誤："+JSON.stringify(data.error);}
        else{document.getElementById('p-name').innerText="大師諮詢";body.innerText=data.candidates?.[0]?.content?.parts?.[0]?.text||"啟示未能顯現。";}
        btn.innerText="完成諮詢";btn.classList.remove('glow-btn');
        btn.onclick=()=>document.getElementById('panel').classList.remove('on');btn.disabled=false;
    }catch(e){
        body.innerText="連結受阻："+e.message;btn.innerText="關閉";btn.disabled=false;
        btn.onclick=()=>document.getElementById('panel').classList.remove('on');
    }
}

// ══════════════════════════════════════════
// 手勢偵測（MediaPipe Hands）
// ══════════════════════════════════════════
let gestureEnabled=false,handsModel=null,mpCamera=null;
let lastDrawTime=0;
const DRAW_CD=2000;

// ── 張開手：至少4指伸直 ──
function isOpenHand(lm){
    const tips=[8,12,16,20],pips=[6,10,14,18];
    let ext=0;
    for(let i=0;i<4;i++) if(lm[tips[i]].y < lm[pips[i]].y-0.04) ext++;
    const thumbOut=Math.abs(lm[4].x-lm[0].x)>0.12;
    return ext>=3&&thumbOut;
}

// ── 握拳：指尖低於PIP關節（比MCP更寬鬆）──
function isFist(lm){
    // 用 PIP 關節（第二關節）判斷，比 MCP 更容易偵測到彎曲
    // 食指8>6, 中指12>10, 無名16>14, 小指20>18
    const tips=[8,12,16,20],pips=[6,10,14,18];
    let curled=0;
    for(let i=0;i<4;i++){
        // 指尖 y > PIP y = 彎曲（y越大越低）
        if(lm[tips[i]].y > lm[pips[i]].y - 0.01) curled++;
    }
    // 3指彎曲就算握拳（不強制要求拇指）
    return curled>=3;
}

function doFlash(){
    const f=document.getElementById('g-flash');
    f.classList.add('on');setTimeout(()=>f.classList.remove('on'),200);
}

function setIndicator(state){
    // state: 'open' | 'fist' | 'none'
    const dot=document.getElementById('g-dot');
    const lbl=document.getElementById('g-label');
    dot.className='g-dot';
    if(state==='open'){dot.classList.add('open');lbl.innerText='張手';}
    else if(state==='fist'){dot.classList.add('fist');lbl.innerText='握拳';}
    else{lbl.innerText='—';}
}

// 手勢狀態
// 邏輯：張手 → 開始循環；在張手狀態下變成非張手（握拳）→ 抽牌
let wasOpen=false;       // 上一幀是否為張手
let openFrames=0;        // 連續張手幀數
let nonOpenFrames=0;     // 張手後連續非張手幀數
const OPEN_CONFIRM=2;    // 需要連續幾幀才算張手
const CLOSE_CONFIRM=2;   // 張手後需要幾幀非張手才觸發抽牌

function onHandResults(results){
    if(!results.multiHandLandmarks||!results.multiHandLandmarks.length){
        // 手離開畫面：重置狀態，停止循環
        openFrames=0;nonOpenFrames=0;wasOpen=false;
        setStreamSpeed(0);setIndicator('none');
        return;
    }
    const lm=results.multiHandLandmarks[0];
    const open=isOpenHand(lm);

    if(open){
        openFrames++;nonOpenFrames=0;
        if(openFrames>=OPEN_CONFIRM){
            wasOpen=true;
            // 張手 → 快速循環
            setStreamSpeed(3);
            setIndicator('open');
            document.getElementById('g-status').innerText='張手中：循環中...';
        }
    } else {
        nonOpenFrames++;openFrames=0;
        setIndicator('none');

        if(wasOpen && nonOpenFrames>=CLOSE_CONFIRM){
            // 從張手變成非張手 → 抽牌！
            wasOpen=false;nonOpenFrames=0;
            setStreamSpeed(0);

            const now=Date.now();
            if(now-lastDrawTime<DRAW_CD)return;
            lastDrawTime=now;

            const avail=deckObjs.filter(o=>!o.isPicked);
            if(!avail.length||pickedCount>=3)return;

            // 抽最靠近畫面中央的牌
            const cx=window.innerWidth/2;
            avail.sort((a,b)=>{
                const ra=a.el.getBoundingClientRect(),rb=b.el.getBoundingClientRect();
                return Math.abs(ra.left+ra.width/2-cx)-Math.abs(rb.left+rb.width/2-cx);
            });

            doFlash();haptic([30,60,30]);
            captureCard(avail[0]);
            document.getElementById('g-status').innerText=`✦ 抽牌！${pickedCount}/3`;
            setTimeout(()=>{
                if(pickedCount<3) document.getElementById('g-status').innerText='張手循環 · 收手抽牌';
            },1500);
        } else if(!wasOpen){
            // 本來就沒張手 → 停止
            setStreamSpeed(0);
            document.getElementById('g-status').innerText='張手循環 · 收手抽牌';
        }
    }
}

async function initGesture(){
    const btn=document.getElementById('gesture-btn');
    const status=document.getElementById('g-status');
    const indicator=document.getElementById('g-indicator');

    if(gestureEnabled){
        gestureEnabled=false;
        if(mpCamera){mpCamera.stop();mpCamera=null;}
        if(handsModel){handsModel.close();handsModel=null;}
        const v=document.getElementById('mp-video');
        if(v.srcObject){v.srcObject.getTracks().forEach(t=>t.stop());v.srcObject=null;}
        btn.classList.remove('active');
        status.classList.remove('show');
        indicator.classList.remove('show');
        setStreamSpeed(1); // 恢復正常速度
        // 恢復點擊抽牌
        return;
    }

    status.innerText='請求鏡頭...';status.classList.add('show');

    try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:320,height:240}});
        const v=document.getElementById('mp-video');
        v.srcObject=stream;await v.play();

        handsModel=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        handsModel.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:0.75,minTrackingConfidence:0.65});
        handsModel.onResults(onHandResults);

        mpCamera=new Camera(v,{
            onFrame:async()=>{if(handsModel)await handsModel.send({image:v});},
            width:320,height:240
        });
        mpCamera.start();

        gestureEnabled=true;
        btn.classList.add('active');
        status.innerText='張手循環 · 握拳抽牌';
        indicator.classList.add('show');

        // 手勢模式下暫停輸送帶，等待張手
        setStreamSpeed(0);

    }catch(err){
        status.innerText=err.name==='NotAllowedError'?'需要鏡頭權限':'鏡頭不支援';
        setTimeout(()=>status.classList.remove('show'),2500);
    }
}

document.getElementById('gesture-btn').addEventListener('click',initGesture);
</script>
